name: roadease
description: RoadEase - Premium roadside assistance and mechanic finder app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  google_fonts: ^6.3.2
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  google_maps_flutter: ^2.5.0
  geolocator: ^11.0.0
  url_launcher: ^6.2.4
  image_picker: ^1.0.7
  shimmer: ^3.0.0
  # HTTP & API
  http: ^1.2.2
  dio: ^5.7.0
  # Local storage
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  # Assets for images and icons
  assets:
    - assets/images/
    - assets/icons/

